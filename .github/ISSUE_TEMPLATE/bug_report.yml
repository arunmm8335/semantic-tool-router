name: Bug report
description: Something is broken or behaves unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the issue locally.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Command, code snippet, or benchmark invocation that triggers the issue.
      placeholder: |
        python -m semantic_tool_router discover "..." --registry examples/tools.json
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.1.0 or git commit SHA"
    validations:
      required: true

  - type: dropdown
    id: python
    attributes:
      label: Python version
      options: ["3.10", "3.11", "3.12", "3.13+"]
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: ["Linux", "macOS", "Windows", "Other"]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or stack trace
      render: shell
