name: Feature request
description: Propose a new capability or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Explain the use case first. Implementation details are optional.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What agent or routing workflow is harder today without this change?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should the library behave? API shape, CLI flag, or benchmark change.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Retrieval / embedders
        - MCP integration
        - Benchmarks / evaluation
        - Safety / permissions
        - Documentation / examples
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this
